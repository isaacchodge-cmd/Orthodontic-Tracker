<h1>Orthodontic Progress Tracker</h1>
<input type="file" id="upload">
<canvas id="canvas"></canvas>
<p id="score">Score: N/A</p>
<p>Click the <b>CENTER</b> of each top tooth.</p>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let points = [];
let currentImage = null;

upload.addEventListener("change", (e) => {
  const file = e.target.files[0];

  currentImage = new Image();
  currentImage.src = URL.createObjectURL(file);

  currentImage.onload = () => {
    canvas.width = currentImage.width;
    canvas.height = currentImage.height;
    points = [];
    draw(); // draw once
    document.getElementById("score").innerText = "Score: N/A";
  };
});

canvas.addEventListener("click", (e) => {
  const x = e.offsetX;
  const y = e.offsetY;

  points.push({ x, y });

  draw();
});

function draw() {
  if (!currentImage) return;

  // Clear + redraw image
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(currentImage, 0, 0);

  // Draw points
  for (let p of points) {
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  if (points.length >= 3) {

    let sorted = [...points].sort((a, b) => a.x - b.x);

    let left = sorted[0];
    let right = sorted[sorted.length - 1];
    let mid = sorted[Math.floor(sorted.length / 2)];

    let x1 = left.x, y1 = left.y;
    let x2 = mid.x, y2 = mid.y;
    let x3 = right.x, y3 = right.y;

    let denom = (x1 - x2)*(x1 - x3)*(x2 - x3);
    if (denom === 0) return;

    let a = (x3*(y2 - y1) + x2*(y1 - y3) + x1*(y3 - y2)) / denom;
    let b = (x3*x3*(y1 - y2) + x2*x2*(y3 - y1) + x1*x1*(y2 - y3)) / denom;
    let c = (x2*x3*(x2 - x3)*y1 + x3*x1*(x3 - x1)*y2 + x1*x2*(x1 - x2)*y3) / denom;

    ctx.strokeStyle = "blue";
    ctx.lineWidth = 2;
    ctx.beginPath();

    let started = false;

    for (let x = 0; x < canvas.width; x++) {
      let y = a * x * x + b * x + c;

      if (y >= 0 && y <= canvas.height) {
        if (!started) {
          ctx.moveTo(x, y);
          started = true;
        } else {
          ctx.lineTo(x, y);
        }
      }
    }

    ctx.stroke();

    let totalDeviation = 0;

    for (let p of sorted) {
      let expectedY = a * p.x * p.x + b * p.x + c;
      totalDeviation += Math.abs(p.y - expectedY);
    }

    let avgDeviation = totalDeviation / sorted.length;
    let score = Math.max(0, 100 - avgDeviation * 0.5);

    document.getElementById("score").innerText =
      "Score: " + score.toFixed(1);
  }
}
</script>
