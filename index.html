<h1>Orthodontic Progress Tracker</h1>
<input type="file" id="upload">
<canvas id="canvas"></canvas>
<p id="score">Score: N/A</p>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let points = [];

upload.addEventListener("change", (e) => {
  const file = e.target.files[0];
  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    points = [];
  };
});

canvas.addEventListener("click", (e) => {
  const x = e.offsetX;
  const y = e.offsetY;

  points.push({ x, y });

  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fill();

  if (points.length >= 2) {
    let avgY = points.reduce((sum, p) => sum + p.y, 0) / points.length;
    let deviation = points.reduce((sum, p) => sum + Math.abs(p.y - avgY), 0);

    let score = 100 - deviation / points.length;
    document.getElementById("score").innerText = "Score: " + score.toFixed(1);
  }
});
</script>
