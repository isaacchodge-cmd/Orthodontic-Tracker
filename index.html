<h1>Orthodontic Progress Tracker</h1>
<input type="file" id="upload">
<canvas id="canvas"></canvas>
<p id="score">Score: N/A</p>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let points = [];

upload.addEventListener("change", (e) => {
  const file = e.target.files[0];
  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    points = [];
  };
});

canvas.addEventListener("click", (e) => {
  const x = e.offsetX;
  const y = e.offsetY;

  points.push({ x, y });

  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fill();

  if (points.length >= 3) {

  // Step 1: sort points left → right
  let sorted = [...points].sort((a, b) => a.x - b.x);

  let left = sorted[0];
  let right = sorted[sorted.length - 1];
  let mid = sorted[Math.floor(sorted.length / 2)];

  function solveParabola(p1, p2, p3) {
    let x1 = p1.x, y1 = p1.y;
    let x2 = p2.x, y2 = p2.y;
    let x3 = p3.x, y3 = p3.y;

    let denom = (x1 - x2)*(x1 - x3)*(x2 - x3);

    if (denom === 0) return null;

    let a = (x3*(y2 - y1) + x2*(y1 - y3) + x1*(y3 - y2)) / denom;
    let b = (x3*x3*(y1 - y2) + x2*x2*(y3 - y1) + x1*x1*(y2 - y3)) / denom;
    let c = (x2*x3*(x2 - x3)*y1 + x3*x1*(x3 - x1)*y2 + x1*x2*(x1 - x2)*y3) / denom;

    return { a, b, c };
  }
    <p>Click the CENTER of each top tooth (same height across all teeth)</p>
    let curve = solveParabola(left, mid, right);

  if (!curve) return;

  let { a, b, c } = curve;

  // Step 2: calculate deviation from curve
  let totalDeviation = 0;

  for (let p of sorted) {
    let expectedY = a * p.x * p.x + b * p.x + c;
    totalDeviation += Math.abs(p.y - expectedY);
  }

  let avgDeviation = totalDeviation / sorted.length;

  // Step 3: convert to score
  let score = Math.max(0, 100 - avgDeviation * 0.5);

  document.getElementById("score").innerText =
    "Score: " + score.toFixed(1);

  // OPTIONAL: draw curve
  ctx.strokeStyle = "blue";
  ctx.beginPath();

  for (let x = 0; x < canvas.width; x++) {
    let y = a * x * x + b * x + c;
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  ctx.stroke();
 }
});
</script>
