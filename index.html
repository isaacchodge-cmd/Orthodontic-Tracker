<h1>Orthodontic Progress Tracker</h1>
<input type="file" id="upload">
<canvas id="canvas"></canvas>
<canvas id="progressChart" width="400" height="200"></canvas>
<p id="score">Score: N/A</p>
<p>Click the <b>CENTER</b> of each top tooth.</p>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let history = [];
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
  
let points = [];
let currentImage = null;

upload.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();
  const url = URL.createObjectURL(file);

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;

    currentImage = img;
    points = [];
    draw();
    document.getElementById("score").innerText = "Score: N/A";
    URL.revokeObjectURL(url);
  };

  img.onerror = () => {
    console.error("Image failed to load");
  };
  img.src = url;
});

canvas.addEventListener("click", (e) => {
  const x = e.offsetX;
  const y = e.offsetY;

  points.push({ x, y });

  draw();

  history.push({
    time: Date.now(),
    score: finalScore
  });

  updateGraph();
});

  function draw() {
    function updateGraph() {
    const graphCtx = document.getElementById('progressChart').getContext('2d');

    let labels = [];
    let dataPoints = [];

    for (let i = 0; history.length; i++) {
      let entry = history[i];

      let date = new Date(entry.time);

      let label = date.toLocaleDateString(undefined, {
        month: 'short',
        day: 'numeric'
      });

      labels.push(label);
      dataPoints.push(entry.score);
    }

    if (window.myChart) {
      window.myChart.destroy();
    }

    window.myChart = new Chart(graphCtx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Alignment Score',
          data: dataPoints,
          borderWidth: 2,
          tension: 0.2
        }]
      },
      options: {
        scales: {
          y: {
            min: 0,
            max: 100
          }
        }
      }
    });
  }

function draw() {
  if (!currentImage) return;

  // This clears and redraws the image to clear up any mess with multiple lines.
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(currentImage, 0, 0);

  // Draws points
  for (let p of points) {
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  if (points.length >= 3) {

    let sorted = [...points].sort((a, b) => a.x - b.x);

    let left = sorted[0];
    let right = sorted[sorted.length - 1];
    let mid = sorted[Math.floor(sorted.length / 2)];

    let x1 = left.x, y1 = left.y;
    let x2 = mid.x, y2 = mid.y;
    let x3 = right.x, y3 = right.y;

    let denom = (x1 - x2)*(x1 - x3)*(x2 - x3);
    if (Math.abs(denom) < 0.0001) return;

    let a = (x3*(y2 - y1) + x2*(y1 - y3) + x1*(y3 - y2)) / denom;
    let b = (x3*x3*(y1 - y2) + x2*x2*(y3 - y1) + x1*x1*(y2 - y3)) / denom;
    let c = (x2*x3*(x2 - x3)*y1 + x3*x1*(x3 - x1)*y2 + x1*x2*(x1 - x2)*y3) / denom;

    ctx.strokeStyle = "blue";
    ctx.lineWidth = 2;
    ctx.beginPath();

    let started = false;

    for (let x = 0; x < canvas.width; x++) {
      let y = a * x * x + b * x + c;

      if (y >= 0 && y <= canvas.height) {
        if (!started) {
          ctx.moveTo(x, y);
          started = true;
        } else {
          ctx.lineTo(x, y);
        }
      }
    }

    ctx.stroke();

    let totalDeviation = 0;
// This is making a quadratic equation using the values of the points given by the user.
    for (let p of sorted) {
      let expectedY = a * p.x * p.x + b * p.x + c;
      totalDeviation += Math.abs(p.y - expectedY);
    }

    let avgDeviation = totalDeviation / sorted.length;
    let score = Math.max(0, 100 - avgDeviation * 2);

    let curveGaps = [];

    for (let i = 0; i < sorted.length - 1; i++) {
      let x1 = sorted[i].x;
      let x2 = sorted[i + 1].x;
// This is essentially giving us a quadratic equation.
      let y1 = a * x1 * x1 + b * x1 + c;
      let y2 = a * x2 * x2 + b * x2 + c;
// This is the distnance formula so we can find the actual distnace between teeth to determine spacing.
      let dist = Math.sqrt((x2 - x1)**2 + (y2 - y1)**2);
      curveGaps.push(dist);
    }

    // This will give us the average space in between each tooth.
    if (curveGaps.length === 0) return;
    let avgGap = curveGaps.reduce((sum, g) => sum + g, 0) / curveGaps.length;

    let spacingDeviation = 0;
// The score is determined by finding out how far away each individual space is from the average space.
    for (let i = 0; i < curveGaps.length; i++) {
      let difference = curveGaps[i] - avgGap;

      if (difference < 0) {
        difference = -difference;
      }

      spacingDeviation += difference;
    }

    spacingDeviation = spacingDeviation / curveGaps.length;
// All of these change the weight of each type of score as they are factored into a overall score.
    let spacingScore = Math.max(0, 100 - spacingDeviation * 1.2);

    let alignmentScore = score;
    let finalScore = alignmentScore * 0.7 + spacingScore * 0.3;

    history.push({
      time: Date.now(),
      score: finalScore
    });

    updateGraph();
    
// This displays all the different scores under the image of the smile.
    document.getElementById("score").innerText =
      "Total: " + finalScore.toFixed(1) +
      " | Alignment: " + alignmentScore.toFixed(1) +
      " | Spacing: " + spacingScore.toFixed(1);

  }
}
</script>
